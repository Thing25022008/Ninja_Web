
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NINJA Store</title>
    <link rel="stylesheet" href="/My_Project1/Second-Project/login.html">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:linear-gradient(135deg,#000000,#8b0000);">
    <form class="d-flex" role="search">
        <a href="index.html" class="btn btn-success me-2 m-5"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left-circle-fill " viewBox="0 0 18 18">
        <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0m3.5 7.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5z"/>
        </svg> Home</a>
      </form>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-4" style="width:400px; border-radius:15px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger">NINJA Store</h2>
            <p class="text-muted">Login to your account</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control"
                       placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control"
                       placeholder="Enter your password">
            </div>

            <div class="d-flex justify-content-between mb-3">
                <div>
                    <input type="checkbox">
                    Remember me
                </div>

                <a href="#" class="text-decoration-none">
                    Forgot Password?
                </a>
            </div>

            <button type="submit"
                    class="btn btn-danger w-100">
                Login
            </button>

            <div class="text-center mt-3">
                Don't have an account?
                <a href="signup.html"
                   class="text-decoration-none">
                    Sign Up
                </a>
            </div>
        </form>

    </div>

</div>

</body>
</html>
